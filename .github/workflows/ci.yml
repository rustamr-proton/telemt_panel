name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build frontend (needed for embed)
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Go format check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Files not formatted with gofmt:"
            echo "$out"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build backend
        run: go build -v .

      - name: Run tests
        run: go test -v ./...
